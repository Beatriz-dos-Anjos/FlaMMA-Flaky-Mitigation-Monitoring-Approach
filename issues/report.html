
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Flaky Test Report</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #eee; }
        .flaky { background: #ffb3b3; }
        .stable { background: #b3ffb3; }
    </style>
</head>
<body>
    <h1>Relatório de Testes Flaky</h1>
    <p>Gerado em: 2025-11-23 11:52:17</p>

    <table>
        <tr>
            <th>Teste</th>
            <th>Passes</th>
            <th>Fails</th>
            <th>Runs</th>
            <th>Porcentagem Falhas</th>
            <th>Status</th>
        </tr>

         html += f"""
    <tr class="{row_class}">
        <td>{test_name}</td>
        <td>{passes}</td>
        <td>{fails}</td>
        <td>{info["runs"]}</td>
        <td>{fail_rate:.1f}%</td>
        <td>{"Flaky" if is_flaky else "Estável"}</td>
    </tr>

    </table>
</body>
</html>
