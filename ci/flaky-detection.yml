name: Flaky Detection Pipeline

on:
  push:
  pull_request:

jobs:
  flaky-detection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate quarantine filter
        run: python quarantine/quarantine.py generate-filter

      - name: Run tests with filter
        continue-on-error: true
        run: |
          pytest -k "$(cat filter.txt)" --junitxml=ci_results.xml

      - name: Run flaky detector
        run: python detector/detect_flaky.py --reruns 3

      - name: Update quarantine list
        run: python quarantine/quarantine.py update

      - name: Create GitHub issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python issues/create_github_issue.py --report flaky_report.json

      - name: Generate HTML report
        run: |
          python .flamma/issues/generate_report.py --report flaky_report.json --out .flamma/issues/report.html

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-detection-artifacts
          path: |
            flaky_report.json
            .flamma/quarantine/flaky_tests.json
            .flamma/issues/report.html
            ci_results.xml
      - name: Debug - Verificar arquivos
        run: |
          echo "=== Conteúdo da raiz ==="
          ls -la *.json *.xml 2>/dev/null || echo "Nenhum arquivo"
          echo "=== Conteúdo de .flamma/issues/ ==="
          ls -la .flamma/issues/
          echo "=== Verificar se report.html foi gerado ==="
          cat .flamma/issues/report.html | head -20 || echo "report.html não existe"

