name: Flaky Detection Pipeline

on:
  push:
  pull_request:

jobs:
  flaky-detection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate quarantine filter
        run: python quarantine/quarantine.py generate-filter

      - name: Run tests with filter
        continue-on-error: true
        run: |
          pytest -k "$(cat filter.txt)" --junitxml=ci_results.xml

      - name: Run flaky detector
        run: python detector/detect_flaky.py --reruns 3

      - name: 🔍 DEBUG - Verificar se flaky_report.json foi gerado
        run: |
          echo "=== Listando raiz do projeto ==="
          ls -la
          echo ""
          if [ -f flaky_report.json ]; then
            echo "✅ flaky_report.json EXISTE"
            echo "Tamanho: $(du -h flaky_report.json)"
            wc -l flaky_report.json
          else
            echo "❌ flaky_report.json NÃO EXISTE"
            exit 1
          fi

      - name: Update quarantine list
        run: python quarantine/quarantine.py update

      - name: Create GitHub issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python issues/create_github_issue.py --report flaky_report.json

      - name: 🔍 DEBUG - Verificar estrutura da pasta issues ANTES
        run: |
          echo "=== Conteúdo de issues/ ANTES ==="
          ls -la issues/
          echo ""
          echo "=== Testando se o script Python existe ==="
          if [ -f issues/generate_report.py ]; then
            echo "✅ Script existe"
            python issues/generate_report.py --help
          else
            echo "❌ Script NÃO existe"
          fi

      - name: Generate HTML report
        run: |
          echo "➡️ Executando: python issues/generate_report.py --report flaky_report.json --out issues/report.html"
          python issues/generate_report.py --report flaky_report.json --out issues/report.html
          echo "✅ Comando executado sem erro"

      - name: 🔍 DEBUG - Verificar se report.html foi criado
        run: |
          echo "=== Conteúdo de issues/ DEPOIS ==="
          ls -la issues/
          echo ""
          if [ -f issues/report.html ]; then
            echo "✅ issues/report.html FOI CRIADO!"
            echo "Tamanho: $(du -h issues/report.html)"
            echo "Primeiras 50 linhas:"
            head -50 issues/report.html
          else
            echo "❌ issues/report.html NÃO FOI CRIADO"
            echo ""
            echo "Procurando report.html em todo o projeto:"
            find . -name "report.html" -type f
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-detection-artifacts
          path: |
            flaky_report.json
            quarantine/flaky_tests.json
            issues/report.html
            ci_results.xml
